# Mrpbot 配置
bot:
  name: "三月七"
  log_level: "INFO"

persona:
  file: "config/characters/casual_companion.md"

channels:
  onebot:
    # 是否启用 OneBot 通道
    enabled: true
    # NapCat/OneBot WebSocket 地址
    ws_url: "ws://127.0.0.1:6199"
    # 访问令牌（建议走环境变量）
    access_token: "${QQ_ACCESS_TOKEN}"
    # 连接断开后的重连间隔（秒）
    reconnect_interval: 5

llm:
  # API Key（建议走环境变量）
  api_key: "${DEEPSEEK_API_KEY}"
  # 兼容 OpenAI 协议的接口地址
  base_url: "https://api.deepseek.com"
  # 使用模型
  model: "deepseek-chat"
  # 单次请求超时（秒）
  timeout: 30
  # 请求失败最大重试次数
  max_retries: 3

features:
  chat:
    # 聊天功能开关
    enabled: true
    # 单次回复最大 token
    max_tokens: 1024
    # 随机性（越高越发散）
    temperature: 0.7

  group:
    # 群聊回复策略开关
    enabled: true
    # @机器人时是否必回
    reply_when_mentioned: true
    # 决策日志详细程度：off / concise / detailed
    # concise 适合演示，detailed 适合调试
    decision_log_level: "detailed"
    # 回复阈值（越低越活跃）
    reply_threshold: 50
    # 会话冷却（秒）
    cooldown: 12

    # 回复节奏控制
    reply_control:
      # 同一用户分段输入合并窗口（秒）
      merge_window_seconds: 5
      # 非@场景最小回复间隔（秒），防止句句都回
      non_mention_min_interval_seconds: 24
      # 命中停口令后静默时长（秒）
      quiet_mode_seconds: 240
      # 停口令关键词，出现后进入静默
      stop_words: ["别回了", "别回复", "不要回", "先别说话", "停一下"]

    # 人性化延迟
    human_timing:
      # 人性化延迟开关
      enabled: true
      # 基础延迟（秒）
      base_delay_seconds: 2.2
      # 随机抖动（秒）
      jitter_seconds: 1.3
      # 最小延迟（秒）
      min_delay_seconds: 1.0
      # 最大延迟（秒）
      max_delay_seconds: 8.5

    # 元 AI 去重
    meta_ai:
      # 元AI裁决开关
      enabled: true
      # 同话题最小回复间隔（秒）
      topic_min_interval_seconds: 60
      # wait/skip 最小置信度（低于此值回退 reply）
      min_confidence: 0.78
      # 重复话题相似度阈值（越高越不容易拦截）
      duplicate_similarity_threshold: 0.72

  memory:
    # 记忆系统开关
    enabled: true
    # 短期记忆条数上限
    short_term_size: 100
    # 自动保存间隔（秒）
    auto_save_interval: 300
    # 长期记忆目录
    dir: "memory"
    # 自动记忆目录
    auto_dir: "memory_auto"

  proactive:
    # 主动消息（竞赛演示建议关闭）
    enabled: false
